<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Tic Tac Toe</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    .controls {
        margin: 20px;
    }

    .controls button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        background: orange;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }

    .cell {
        width: 100px;
        height: 100px;
        font-size: 35px;
        background: #ffffff22;
        border-radius: 10px;
        border: 2px solid white;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
    }

    .cell:hover {
        background: #ffffff44;
    }

    .win {
        background: limegreen !important;
        color: black;
    }

    #status {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }

    .scoreboard {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .scoreboard div {
        background: orange;
        padding: 10px 20px;
        border-radius: 8px;
        color: black;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1> Tic Tac Toe</h1>

<div class="controls">
    <button onclick="resetGame()">Reset</button>
</div>

<div class="board" id="board"></div>

<div id="status">Player 1 (X) Turn</div>

<div class="scoreboard">
    <div>Player 1: <span id="p1">0</span></div>
    <div>Player 2: <span id="p2">0</span></div>
    <div>Draw: <span id="draw">0</span></div>
</div>

<script>
let board = ["","","","","","","","",""];
let player = 1;
let gameOver = false;

let p1Score = 0, p2Score = 0, drawScore = 0;

const boardDiv = document.getElementById("board");
const statusDiv = document.getElementById("status");

function createBoard() {
    boardDiv.innerHTML = "";
    board.forEach((val, i) => {
        let btn = document.createElement("button");
        btn.classList.add("cell");
        btn.innerText = val;
        btn.onclick = () => move(i);
        boardDiv.appendChild(btn);
    });
}

function move(i) {
    if (board[i] !== "" || gameOver) return;

    let mark = player === 1 ? "X" : "O";
    board[i] = mark;

    let winData = checkWin();

    if (winData) {
        highlight(winData);
        statusDiv.innerText = `Player ${player} Wins!`;
        gameOver = true;

        if (player === 1) {
            p1Score++;
            document.getElementById("p1").innerText = p1Score;
        } else {
            p2Score++;
            document.getElementById("p2").innerText = p2Score;
        }

    } else if (board.every(c => c !== "")) {
        statusDiv.innerText = "It's a Draw!";
        drawScore++;
        document.getElementById("draw").innerText = drawScore;
        gameOver = true;
    } else {
        player = player === 1 ? 2 : 1;
        statusDiv.innerText = `Player ${player} (${player === 1 ? "X" : "O"}) Turn`;
    }

    createBoard();
}

function checkWin() {
    const wins = [
        [0,1,2],[0,3,6],[6,7,8],[2,5,8],
        [0,4,8],[2,4,6],[1,4,7],[3,4,5]
    ];

    for (let combo of wins) {
        let [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[b] === board[c]) {
            return combo;
        }
    }
    return null;
}

function highlight(combo) {
    setTimeout(() => {
        let cells = document.querySelectorAll(".cell");
        combo.forEach(i => cells[i].classList.add("win"));
    }, 100);
}

function resetGame() {
    board = ["","","","","","","","",""];
    player = 1;
    gameOver = false;
    statusDiv.innerText = "Player 1 (X) Turn";
    createBoard();
}

createBoard();
</script>

</body>
</html>
